name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v6

      - name: Copy host config
        run: |
          cp ~/config.env ./
          # Ensure the test/smoke phases have everything the settings
          # validator requires. Append-if-missing so we don't clobber
          # a host config that already has stricter values.
          grep -q '^JWT_SECRET' config.env || echo 'JWT_SECRET="ci-test-secret-ci-test-secret-32bytes"' >> config.env
          grep -q '^ADMIN_PASSWORD' config.env || echo 'ADMIN_PASSWORD="dmart"' >> config.env
          grep -q '^DATABASE_HOST' config.env || echo 'DATABASE_HOST="127.0.0.1"' >> config.env
          grep -q '^DATABASE_USERNAME' config.env || echo 'DATABASE_USERNAME="dmart"' >> config.env
          grep -q '^DATABASE_PASSWORD' config.env || echo 'DATABASE_PASSWORD="dmart"' >> config.env
          grep -q '^DATABASE_NAME' config.env || echo 'DATABASE_NAME="dmart"' >> config.env
          dropdb --if-exists -h 127.0.0.1 -U dmart dmart
          createdb -h 127.0.0.1 -U dmart dmart

      - name: Build
        run: dotnet build dmart.slnx -c Release --nologo

      - name: Unit + integration tests
        # BACKEND_ENV pins the validator-required config for the test host.
        # Without this, Directory.GetCurrentDirectory() during `dotnet test`
        # may resolve to the test project's output dir, making the ./config.env
        # lookup miss the file at the repo root.
        run: BACKEND_ENV=$(pwd)/config.env DMART_TEST_PWD=dmart dotnet test dmart.Tests/dmart.Tests.csproj -c Release --nologo --logger "trx;LogFileName=results.trx"

      - name: AOT publish
        run: |
          rm -rf bin obj
          dotnet publish dmart.csproj -r linux-x64 -p:PublishAot=true -p:StripSymbols=true -c Release
          PUBLISH_DIR="bin/Release/net10.0/linux-x64/publish"
          rm -f "$PUBLISH_DIR"/*.dbg "$PUBLISH_DIR"/*.pdb "$PUBLISH_DIR"/*.Development.json "$PUBLISH_DIR"/*.staticwebassets* "$PUBLISH_DIR"/*.deps.json

      - name: E2E smoke tests (curl.sh)
        run: |
          PUBLISH_DIR="bin/Release/net10.0/linux-x64/publish"
          # config.env already populated in the "Copy host config" step.
          cp config.env "$PUBLISH_DIR/"
          # Start server from the publish directory
          (cd "$PUBLISH_DIR" && ./dmart serve) &
          SERVER_PID=$!
          # Wait for server to come up — try both common ports
          sleep 3
          DMART_PORT=""
          for port in 5099 7979 8080; do
            if curl -sf "http://127.0.0.1:${port}/" >/dev/null 2>&1; then
              DMART_PORT=$port
              break
            fi
          done
          if [ -z "$DMART_PORT" ]; then
            # Longer wait, scan again
            sleep 10
            for port in 5099 7979 8080; do
              if curl -sf "http://127.0.0.1:${port}/" >/dev/null 2>&1; then
                DMART_PORT=$port
                break
              fi
            done
          fi
          echo "Server detected on port: ${DMART_PORT:-NONE}"
          # Use DmartSettings defaults (dmart/dmart) — on a fresh DB the
          # bootstrap creates this admin user automatically.
          DMART_URL="http://127.0.0.1:${DMART_PORT}" DMART_ADMIN=dmart DMART_PWD=dmart ./curl.sh
          CURL_RC=$?
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit $CURL_RC

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: dmart.Tests/TestResults/
