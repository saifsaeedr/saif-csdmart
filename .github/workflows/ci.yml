name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v6

      - name: Build UI tarballs (smoke)
        # Mirror what release.yml's build-ui-tarballs job does — runs
        # `yarn install` at the workspace root and then `yarn build`
        # under cxb/ and catalog/. Catches yarn-install / vite-build
        # regressions at PR time instead of at release time, where they
        # have previously only surfaced after a tag was already cut.
        # No untrusted input is interpolated into the run: command — it
        # invokes the checked-in build-ui.sh script with no arguments.
        run: ./build-ui.sh

      - name: Copy host config
        # Absolute paths throughout — the runner's $HOME is per-instance
        # (/home/githubrunner/runners/rXX/home) under the systemd override
        # that isolates per-runner podman/NuGet state. The host config and
        # the PostgreSQL .pgpass both live in the real githubrunner home.
        env:
          PGPASSFILE: /home/githubrunner/.pgpass
        run: |
          # set -e so a silent dropdb/createdb failure no longer cascades
          # into a polluted-DB test run where the admin password is stale
          # from a prior run and every login 401s. Without this guard, a
          # dangling PG connection from a previous job that wasn't fully
          # cleaned up blocks the drop, the create no-ops against the
          # still-existing DB, and the next run inherits stale state.
          # Fail loud at the drop step instead.
          set -e
          cp /home/githubrunner/config.env ./
          # Ensure the test/smoke phases have everything the settings
          # validator requires. Append-if-missing so we don't clobber
          # a host config that already has stricter values.
          grep -q '^JWT_SECRET' config.env || echo 'JWT_SECRET="ci-test-secret-ci-test-secret-32bytes"' >> config.env
          grep -q '^ADMIN_PASSWORD' config.env || echo 'ADMIN_PASSWORD="dmart"' >> config.env
          grep -q '^DATABASE_HOST' config.env || echo 'DATABASE_HOST="127.0.0.1"' >> config.env
          grep -q '^DATABASE_USERNAME' config.env || echo 'DATABASE_USERNAME="dmart"' >> config.env
          grep -q '^DATABASE_PASSWORD' config.env || echo 'DATABASE_PASSWORD="dmart"' >> config.env
          grep -q '^DATABASE_NAME' config.env || echo 'DATABASE_NAME="dmart"' >> config.env
          # Pre-amble: kick any sessions still attached to the dmart DB.
          # PostgreSQL refuses to drop a database with open connections, and
          # a prior CI run's `dmart serve` may not have fully released its
          # pool before SIGTERM landed — those orphan backends block dropdb
          # below and force the test phase to reuse stale schema + stale
          # admin password from the prior run. `|| true` keeps a cold-PG
          # / missing-DB case from blocking; only dropdb is required to
          # succeed.
          psql -w -h 127.0.0.1 -U dmart -d postgres -c \
            "SELECT pg_terminate_backend(pid) FROM pg_stat_activity \
             WHERE datname='dmart' AND pid <> pg_backend_pid();" \
            >/dev/null || true
          # -w makes these fail fast (no password prompt) if PGPASSFILE miss.
          dropdb   -w --if-exists -h 127.0.0.1 -U dmart dmart
          createdb -w             -h 127.0.0.1 -U dmart dmart

      - name: Build
        run: dotnet build dmart.slnx -c Release --nologo

      - name: Unit + integration tests
        # BACKEND_ENV pins the validator-required config for the test host.
        # Without this, Directory.GetCurrentDirectory() during `dotnet test`
        # may resolve to the test project's output dir, making the ./config.env
        # lookup miss the file at the repo root.
        run: BACKEND_ENV=$(pwd)/config.env DMART_TEST_PWD=dmart dotnet test dmart.Tests/dmart.Tests.csproj -c Release --nologo --logger "trx;LogFileName=results.trx"

      # AOT publish lives in release.yml (build-fedora-rpm, build-el9-rpm,
      # build-windows, build-container — all exercise `dotnet publish
      # -p:PublishAot=true` on their respective RIDs). Running it again on
      # every push cost ~3 min per CI run for the smallest of incremental
      # signals: the trim/AOT analyzers (gated on `$(CI)=='true'` in
      # dmart.csproj) already fire during the regular `dotnet build` step
      # above and catch the analyzer-detectable subset. What's only caught
      # at native-link time (deep trimmer + ILC errors) is acceptable to
      # defer to release.yml as long as releases keep going out regularly.

      - name: E2E smoke tests (curl.sh)
        run: |
          # Smoke against the JIT apphost from the Build step's output.
          # That binary still exercises every HTTP handler, JSON
          # serializer, and middleware path — what it doesn't exercise
          # is the native-trimmed binary shape, which release.yml covers.
          BUILD_DIR="bin/Release/net10.0"
          # config.env already populated in the "Copy host config" step.
          cp config.env "$BUILD_DIR/"
          # Start server from the build output directory (apphost
          # finds its DLL + deps next to itself). BACKEND_ENV points at
          # the copied-in config.env explicitly — the cwd lookup that
          # used to find it was removed in the DotEnv hardening, so
          # without this flag the server starts with empty config and
          # the smoke tests collapse on missing BASE_URL etc.
          (cd "$BUILD_DIR" && BACKEND_ENV=./config.env ./dmart serve) &
          SERVER_PID=$!
          # Wait for server to come up — try both common ports
          sleep 3
          DMART_PORT=""
          for port in 5099 7979 8080; do
            if curl -sf "http://127.0.0.1:${port}/" >/dev/null 2>&1; then
              DMART_PORT=$port
              break
            fi
          done
          if [ -z "$DMART_PORT" ]; then
            # Longer wait, scan again
            sleep 10
            for port in 5099 7979 8080; do
              if curl -sf "http://127.0.0.1:${port}/" >/dev/null 2>&1; then
                DMART_PORT=$port
                break
              fi
            done
          fi
          echo "Server detected on port: ${DMART_PORT:-NONE}"
          # Use DmartSettings defaults (dmart/dmart) — on a fresh DB the
          # bootstrap creates this admin user automatically.
          DMART_URL="http://127.0.0.1:${DMART_PORT}" DMART_ADMIN=dmart DMART_PWD=dmart ./curl.sh
          CURL_RC=$?
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit $CURL_RC

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: dmart.Tests/TestResults/
