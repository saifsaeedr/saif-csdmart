name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Copy host config
        run: |
          cp ~/config.env ./
          dropdb --if-exists -h 127.0.0.1 -U dmart dmart
          createdb -h 127.0.0.1 -U dmart dmart

      - name: Build
        run: dotnet build dmart.slnx -c Release --nologo

      - name: Unit + integration tests
        run: dotnet test dmart.Tests/dmart.Tests.csproj -c Release --nologo --logger "trx;LogFileName=results.trx"

      - name: AOT publish
        run: |
          rm -rf bin obj
          dotnet publish dmart.csproj -r linux-x64 -p:PublishAot=true -p:StripSymbols=true -c Release
          PUBLISH_DIR="bin/Release/net10.0/linux-x64/publish"
          rm -f "$PUBLISH_DIR"/*.dbg "$PUBLISH_DIR"/*.pdb "$PUBLISH_DIR"/*.Development.json "$PUBLISH_DIR"/*.staticwebassets* "$PUBLISH_DIR"/*.deps.json

      - name: E2E smoke tests (curl.sh)
        run: |
          PUBLISH_DIR="bin/Release/net10.0/linux-x64/publish"
          cp config.env "$PUBLISH_DIR/"
          # Read the port from config.env (fallback to 5099)
          DMART_PORT=$(grep -m1 '^LISTENING_PORT' config.env | sed 's/.*=//' | tr -d '"' || echo 5099)
          # Start server from the publish directory
          (cd "$PUBLISH_DIR" && ./dmart serve) &
          SERVER_PID=$!
          sleep 3
          for i in $(seq 1 15); do
            curl -sf "http://127.0.0.1:${DMART_PORT}/" >/dev/null 2>&1 && break
            sleep 1
          done
          DMART_ADMIN=$(grep -m1 '^ADMIN_SHORTNAME' config.env | sed 's/^[^=]*=//' | tr -d '"' || true)
          DMART_PWD=$(grep -m1 '^ADMIN_PASSWORD' config.env | sed 's/^[^=]*=//' | tr -d '"' || true)
          # Fall back to DmartSettings defaults when config.env doesn't have admin keys
          DMART_ADMIN="${DMART_ADMIN:-dmart}"
          DMART_PWD="${DMART_PWD:-dmart}"
          DMART_URL="http://127.0.0.1:${DMART_PORT}" DMART_ADMIN="$DMART_ADMIN" DMART_PWD="$DMART_PWD" ./curl.sh
          CURL_RC=$?
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit $CURL_RC

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: dmart.Tests/TestResults/
