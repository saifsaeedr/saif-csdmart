name: Release

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write
  packages: write

jobs:
  build-ui-tarballs:
    name: Build UI tarballs (cxb + catalog)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build UI frontends (cxb + catalog)
        run: ./build-ui.sh

      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION:-0.1.0}" >> "$GITHUB_OUTPUT"

      - name: Package tarballs
        run: |
          mkdir -p dist/out
          V="${{ steps.version.outputs.version }}"
          # Flat-root archives — extract into a web docroot and the SPA runs.
          # Each bundle's own index.html / config.json / assets/ are at the top.
          tar -czf "dist/out/cxb-${V}.tar.gz"     -C cxb/dist/client     .
          tar -czf "dist/out/catalog-${V}.tar.gz" -C catalog/dist/client .
          ls -lh dist/out/*.tar.gz

      - name: Upload UI tarballs to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            dist/out/cxb-*.tar.gz dist/out/catalog-*.tar.gz --clobber

      - uses: actions/upload-artifact@v7
        with:
          name: ui-tarballs
          path: dist/out/*.tar.gz

  publish-nuget:
    name: Publish Dmart.Models + Dmart.Client to NuGet
    runs-on: self-hosted
    # Bubble the secret up to job-level env so the step-level `if:`
    # expression can read it (env.X is resolved at the step evaluator,
    # secrets.X is not).
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION:-0.1.0}" >> "$GITHUB_OUTPUT"

      # Pack both packages. MSBuild resolves the ProjectReference so
      # Dmart.Client.nupkg correctly declares a PackageReference on
      # Dmart.Models of the same version.
      - name: Pack Dmart.Models + Dmart.Client
        run: |
          V="${{ steps.version.outputs.version }}"
          dotnet pack Dmart.Models/Dmart.Models.csproj \
            -c Release -p:Version="$V" --nologo -o dist/out/nuget
          dotnet pack dmart.Client/dmart.Client.csproj \
            -c Release -p:Version="$V" --nologo -o dist/out/nuget
          ls -lh dist/out/nuget/

      - name: Upload .nupkg files to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            dist/out/nuget/*.nupkg dist/out/nuget/*.snupkg --clobber

      # Requires NUGET_API_KEY secret on the repo. `--skip-duplicate`
      # makes the push idempotent — re-running a release doesn't fail
      # if a package version was already published. If the secret isn't
      # configured the step no-ops cleanly so the rest of the workflow
      # (RPMs, container, tarballs) still succeeds.
      - name: Push to nuget.org
        if: github.event_name == 'release' && env.NUGET_API_KEY != ''
        run: |
          dotnet nuget push "dist/out/nuget/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: dist/out/nuget/*

  build-srpm:
    name: Build Source RPM
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build UI frontends (cxb + catalog)
        run: ./build-ui.sh

      - name: Build SRPM
        run: |
          pkill -f 'dmart serve' 2>/dev/null || true
          sleep 1
          rm -rf bin obj dist/out
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.1.0}"
          VERSION="$VERSION" ./dist/build-rpm.sh srpm

      - name: Upload SRPM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SRPM=$(ls dist/out/*.src.rpm 2>/dev/null | head -1)
          if [ -n "$SRPM" ]; then
            gh release upload "$GITHUB_REF_NAME" "$SRPM" --clobber
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: srpm
          path: dist/out/*.src.rpm

  build-fedora-rpm:
    name: Build Fedora RPM
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build UI frontends (cxb + catalog)
        run: ./build-ui.sh

      - name: Build Fedora RPM
        run: |
          pkill -f 'dmart serve' 2>/dev/null || true
          sleep 1
          rm -rf bin obj dist/out
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.1.0}"
          VERSION="$VERSION" ./dist/build-rpm.sh

      - name: Upload Fedora RPM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RPM=$(ls dist/out/*fc*.x86_64.rpm 2>/dev/null | head -1)
          if [ -n "$RPM" ]; then
            gh release upload "$GITHUB_REF_NAME" "$RPM" --clobber
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: fedora-rpm
          path: dist/out/*.x86_64.rpm

  build-el9-rpm:
    name: Build RHEL 9 RPM
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build UI frontends (cxb + catalog)
        run: ./build-ui.sh

      # Reclaim podman storage WITHOUT touching the dmart-el9-builder
      # container. build-rpm.sh keeps that container (with dotnet-sdk-10.0,
      # rpm-build, and clang pre-installed) around so subsequent runs just
      # `podman start` it instead of reinstalling the SDK — a 3-5 min save
      # per release. Pruning builder cache + dangling images is enough to
      # reclaim the space without breaking that reuse.
      - name: Reclaim podman storage
        run: |
          df -h ~ || true
          podman builder prune -af || true
          podman image prune -f || true
          df -h ~ || true

      - name: Build EL9 RPM via podman
        run: |
          pkill -f 'dmart serve' 2>/dev/null || true
          sleep 1
          rm -rf dist/out
          # Remove stale builder container from previous runs
          podman rm -f dmart-el9-builder 2>/dev/null || true
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.1.0}"
          VERSION="$VERSION" ./dist/build-rpm.sh el9

      - name: Upload EL9 RPM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RPM=$(ls dist/out/*el9*.x86_64.rpm 2>/dev/null | head -1)
          if [ -n "$RPM" ]; then
            gh release upload "$GITHUB_REF_NAME" "$RPM" --clobber
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: el9-rpm
          path: dist/out/*.x86_64.rpm

  build-windows:
    name: Build Windows (win-x64 AOT)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node (for CXB frontend)
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build UI frontends (cxb + catalog)
        shell: bash
        run: |
          # Windows runner has no yarn by default — install globally once
          # before invoking build-ui.sh, which will then pick it up.
          npm install --global yarn
          ./build-ui.sh

      - name: Set version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION:-0.1.0}" >> "$GITHUB_OUTPUT"

      - name: Publish AOT win-x64
        shell: pwsh
        run: |
          # Mirror build.sh's format: "describe branch=X date=Y". `git describe`
          # already embeds the SHA when past a tag, so there's no separate
          # commit field. fetch-depth: 0 above guarantees tag history.
          $describe = (git describe --tags --always 2>$null).Trim()
          if (-not $describe) { $describe = "v${{ steps.version.outputs.version }}" }
          $date = (git show --pretty=format:%ad --date=short -q 2>$null).Trim()
          if (-not $date) { $date = Get-Date -Format yyyy-MM-dd }
          $info = "$describe branch=${env:GITHUB_REF_NAME} date=$date"
          dotnet publish dmart.csproj -r win-x64 -c Release `
            -p:PublishAot=true `
            -p:StripSymbols=true `
            -p:InformationalVersion="$info"

      - name: Prune dev-only artifacts + package zip
        shell: pwsh
        run: |
          $pub = "bin/Release/net10.0/win-x64/publish"
          Get-ChildItem $pub -File | Where-Object {
            $_.Name -match '\.pdb$|\.Development\.json$|\.deps\.json$|staticwebassets'
          } | Remove-Item -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path dist/out | Out-Null
          $zip = "dist/out/dmart-${{ steps.version.outputs.version }}-win-x64.zip"
          Compress-Archive -Path "$pub/*" -DestinationPath $zip -Force
          Get-ChildItem $zip | Format-List FullName,Length

      - name: Upload Windows zip to release
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $zip = Get-ChildItem dist/out/*-win-x64.zip | Select-Object -First 1 -ExpandProperty FullName
          if ($zip) { gh release upload "$env:GITHUB_REF_NAME" "$zip" --clobber }

      - uses: actions/upload-artifact@v7
        with:
          name: windows-zip
          path: dist/out/*-win-x64.zip

  build-container:
    name: Build & Push Container Image
    runs-on: self-hosted
    steps:
      # fetch-depth: 0 — need tag history so `git describe --tags` below
      # produces a proper version label for the baked-in InformationalVersion.
      # .dockerignore excludes .git/, so we compute it out here and pass in.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Reclaim podman storage WITHOUT wiping base images or the long-lived
      # el9 builder container. `podman system prune -af` would also blow
      # away `mcr.microsoft.com/dotnet/sdk:10.0-alpine`, `alpine:edge`, and
      # the almalinux:9 layers that the dmart-el9-builder depends on —
      # forcing re-pulls and full SDK reinstalls on every release.
      #
      # We instead target just the real hogs:
      #   1. Build cache (podman builder prune) — where prior `podman build`
      #      intermediate layers pile up.
      #   2. Dangling images (no `-a`) — images with no tag, typically orphans.
      #   3. Old ghcr.io/edraj/csdmart:<version> tags, keeping :latest and
      #      the version we're about to push.
      - name: Reclaim podman storage
        run: |
          df -h ~ || true
          podman builder prune -af || true
          podman image prune -f || true
          # Delete superseded versioned images of this repo, keep :latest
          # and the incoming version. Safe because the push step tags both.
          KEEP_VER="${GITHUB_REF_NAME#v}"
          KEEP_VER="${KEEP_VER:-0.1.0}"
          podman image ls --format '{{.Repository}}:{{.Tag}}' \
            | grep '^ghcr.io/${{ github.repository }}:' \
            | grep -v ':latest$' \
            | grep -v ":${KEEP_VER}$" \
            | xargs -r -n1 podman rmi -f || true
          df -h ~ || true

      - name: Build UI frontends (cxb + catalog)
        run: ./build-ui.sh

      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION:-0.1.0}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build all-in-one container image
        run: |
          # Pass git metadata explicitly — .dockerignore excludes .git/, so
          # the csproj can't derive these inside the build stage.
          GIT_DESCRIBE=$(git describe --tags --always)
          GIT_DATE=$(git show --pretty=format:%cs -q HEAD)
          podman build \
            -t ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }} \
            -t ghcr.io/${{ github.repository }}:latest \
            -f admin_scripts/docker/Dockerfile \
            --build-arg VERSION=${{ steps.version.outputs.version }} \
            --build-arg GIT_DESCRIBE="${GIT_DESCRIBE}" \
            --build-arg GIT_BRANCH="${GITHUB_REF_NAME}" \
            --build-arg GIT_DATE="${GIT_DATE}" \
            .

      - name: Push container image
        run: |
          podman push ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          podman push ghcr.io/${{ github.repository }}:latest

      - name: Print image info
        run: |
          echo "Pushed:"
          echo "  ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}"
          echo "  ghcr.io/${{ github.repository }}:latest"
          echo ""
          echo "Run with:"
          echo "  podman run --name dmart -p 8000:8000 -d -it ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}"
