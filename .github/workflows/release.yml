name: Release

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write
  packages: write

jobs:
  build-ui-tarballs:
    name: Build UI tarballs (cxb + catalog)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build UI frontends (cxb + catalog)
        run: ./build-ui.sh

      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION:-0.1.0}" >> "$GITHUB_OUTPUT"

      - name: Package tarballs
        run: |
          mkdir -p dist/out
          V="${{ steps.version.outputs.version }}"
          # Flat-root archives — extract into a web docroot and the SPA runs.
          # Each bundle's own index.html / config.json / assets/ are at the top.
          tar -czf "dist/out/cxb-${V}.tar.gz"     -C cxb/dist/client     .
          tar -czf "dist/out/catalog-${V}.tar.gz" -C catalog/dist/client .
          ls -lh dist/out/*.tar.gz

      - name: Upload UI tarballs to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            dist/out/cxb-*.tar.gz dist/out/catalog-*.tar.gz --clobber

      - uses: actions/upload-artifact@v7
        with:
          name: ui-tarballs
          path: dist/out/*.tar.gz

  publish-nuget:
    name: Publish Dmart.Models + Dmart.Client + Dmart.SqlAdapter to NuGet
    runs-on: self-hosted
    # Bubble the secret up to job-level env so the step-level `if:`
    # expression can read it (env.X is resolved at the step evaluator,
    # secrets.X is not).
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION:-0.1.0}" >> "$GITHUB_OUTPUT"

      # Pack the three NuGet-shippable SDKs. MSBuild resolves the
      # ProjectReferences so Dmart.Client.nupkg and Dmart.SqlAdapter.nupkg
      # correctly declare a PackageReference on Dmart.Models at the same
      # version. Dmart.SqlAdapter is excluded from the AOT server binary
      # (see <Compile Remove="Dmart.SqlAdapter/**" /> in dmart.csproj) but
      # is part of the public SDK surface and ships on the same release
      # cadence as Models / Client.
      - name: Pack Dmart.Models + Dmart.Client + Dmart.SqlAdapter
        run: |
          V="${{ steps.version.outputs.version }}"
          dotnet pack Dmart.Models/Dmart.Models.csproj \
            -c Release -p:Version="$V" --nologo -o dist/out/nuget
          dotnet pack dmart.Client/dmart.Client.csproj \
            -c Release -p:Version="$V" --nologo -o dist/out/nuget
          dotnet pack Dmart.SqlAdapter/Dmart.SqlAdapter.csproj \
            -c Release -p:Version="$V" --nologo -o dist/out/nuget
          ls -lh dist/out/nuget/

      - name: Upload .nupkg files to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            dist/out/nuget/*.nupkg dist/out/nuget/*.snupkg --clobber

      # Requires NUGET_API_KEY secret on the repo. `--skip-duplicate`
      # makes the push idempotent — re-running a release doesn't fail
      # if a package version was already published. If the secret isn't
      # configured the step no-ops cleanly so the rest of the workflow
      # (RPMs, container, tarballs) still succeeds.
      - name: Push to nuget.org
        if: github.event_name == 'release' && env.NUGET_API_KEY != ''
        run: |
          dotnet nuget push "dist/out/nuget/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: dist/out/nuget/*

  build-srpm:
    name: Build Source RPM
    runs-on: self-hosted
    needs: build-ui-tarballs
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download UI tarballs
        uses: actions/download-artifact@v7
        with:
          name: ui-tarballs
          path: dist/out

      - name: Extract UI dists
        run: |
          V="${GITHUB_REF_NAME#v}"; V="${V:-0.1.0}"
          mkdir -p cxb/dist/client catalog/dist/client
          tar -xzf "dist/out/cxb-${V}.tar.gz"     -C cxb/dist/client
          tar -xzf "dist/out/catalog-${V}.tar.gz" -C catalog/dist/client

      - name: Build SRPM
        run: |
          pkill -f 'dmart serve' 2>/dev/null || true
          sleep 1
          rm -rf bin obj dist/out
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.1.0}"
          VERSION="$VERSION" ./dist/build-rpm.sh srpm

      - name: Upload SRPM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SRPM=$(ls dist/out/*.src.rpm 2>/dev/null | head -1)
          if [ -n "$SRPM" ]; then
            gh release upload "$GITHUB_REF_NAME" "$SRPM" --clobber
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: srpm
          path: dist/out/*.src.rpm

  build-fedora-rpm:
    name: Build Fedora RPM
    runs-on: self-hosted
    needs: build-ui-tarballs
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download UI tarballs
        uses: actions/download-artifact@v7
        with:
          name: ui-tarballs
          path: dist/out

      - name: Extract UI dists
        run: |
          V="${GITHUB_REF_NAME#v}"; V="${V:-0.1.0}"
          mkdir -p cxb/dist/client catalog/dist/client
          tar -xzf "dist/out/cxb-${V}.tar.gz"     -C cxb/dist/client
          tar -xzf "dist/out/catalog-${V}.tar.gz" -C catalog/dist/client

      - name: Build Fedora RPM
        run: |
          pkill -f 'dmart serve' 2>/dev/null || true
          sleep 1
          rm -rf bin obj dist/out
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.1.0}"
          VERSION="$VERSION" ./dist/build-rpm.sh

      - name: Upload Fedora RPM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RPM=$(ls dist/out/*fc*.x86_64.rpm 2>/dev/null | head -1)
          if [ -n "$RPM" ]; then
            gh release upload "$GITHUB_REF_NAME" "$RPM" --clobber
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: fedora-rpm
          path: dist/out/*.x86_64.rpm

  build-el9-rpm:
    name: Build RHEL 9 RPM
    runs-on: self-hosted
    needs: build-ui-tarballs
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download UI tarballs
        uses: actions/download-artifact@v7
        with:
          name: ui-tarballs
          path: dist/out

      - name: Extract UI dists
        run: |
          V="${GITHUB_REF_NAME#v}"; V="${V:-0.1.0}"
          mkdir -p cxb/dist/client catalog/dist/client
          tar -xzf "dist/out/cxb-${V}.tar.gz"     -C cxb/dist/client
          tar -xzf "dist/out/catalog-${V}.tar.gz" -C catalog/dist/client

      # Reclaim podman storage WITHOUT touching the dmart-el9-builder
      # container. build-rpm.sh keeps that container (with dotnet-sdk-10.0,
      # rpm-build, and clang pre-installed) around so subsequent runs just
      # `podman start` it instead of reinstalling the SDK — a 3-5 min save
      # per release. Pruning builder cache + dangling images is enough to
      # reclaim the space without breaking that reuse.
      - name: Reclaim podman storage
        run: |
          df -h ~ || true
          podman builder prune -af || true
          podman image prune -f || true
          df -h ~ || true

      - name: Build EL9 RPM via podman
        run: |
          pkill -f 'dmart serve' 2>/dev/null || true
          sleep 1
          rm -rf dist/out
          # Remove stale builder container from previous runs
          podman rm -f dmart-el9-builder 2>/dev/null || true
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.1.0}"
          VERSION="$VERSION" ./dist/build-rpm.sh el9

      - name: Upload EL9 RPM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RPM=$(ls dist/out/*el9*.x86_64.rpm 2>/dev/null | head -1)
          if [ -n "$RPM" ]; then
            gh release upload "$GITHUB_REF_NAME" "$RPM" --clobber
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: el9-rpm
          path: dist/out/*.x86_64.rpm

  build-windows:
    name: Build Windows (win-x64 AOT)
    runs-on: windows-latest
    needs: build-ui-tarballs
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download UI tarballs
        uses: actions/download-artifact@v7
        with:
          name: ui-tarballs
          path: dist/out

      - name: Extract UI dists
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"; V="${V:-0.1.0}"
          mkdir -p cxb/dist/client catalog/dist/client
          tar -xzf "dist/out/cxb-${V}.tar.gz"     -C cxb/dist/client
          tar -xzf "dist/out/catalog-${V}.tar.gz" -C catalog/dist/client

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Set version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION:-0.1.0}" >> "$GITHUB_OUTPUT"

      - name: Publish AOT win-x64
        shell: pwsh
        run: |
          # Mirror build.sh's format: "describe branch=X date=Y". --long
          # forces `git describe` to always emit "<tag>-<n>-g<sha>" — without
          # it, an exact-tag commit collapses to just the tag and the short
          # SHA goes missing. fetch-depth: 0 above guarantees tag history.
          $describe = (git describe --tags --always --long 2>$null).Trim()
          if (-not $describe) { $describe = "v${{ steps.version.outputs.version }}" }
          $date = (git show --pretty=format:%ad --date=short -q 2>$null).Trim()
          if (-not $date) { $date = Get-Date -Format yyyy-MM-dd }
          $info = "$describe branch=${env:GITHUB_REF_NAME} date=$date"
          dotnet publish dmart.csproj -r win-x64 -c Release `
            -p:PublishAot=true `
            -p:StripSymbols=true `
            -p:InformationalVersion="$info"

      - name: Prune dev-only artifacts + package zip
        shell: pwsh
        run: |
          $pub = "bin/Release/net10.0/win-x64/publish"
          Get-ChildItem $pub -File | Where-Object {
            $_.Name -match '\.pdb$|\.Development\.json$|\.deps\.json$|staticwebassets'
          } | Remove-Item -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path dist/out | Out-Null
          $zip = "dist/out/dmart-${{ steps.version.outputs.version }}-win-x64.zip"
          Compress-Archive -Path "$pub/*" -DestinationPath $zip -Force
          Get-ChildItem $zip | Format-List FullName,Length

      - name: Upload Windows zip to release
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $zip = Get-ChildItem dist/out/*-win-x64.zip | Select-Object -First 1 -ExpandProperty FullName
          if ($zip) { gh release upload "$env:GITHUB_REF_NAME" "$zip" --clobber }

      - uses: actions/upload-artifact@v7
        with:
          name: windows-zip
          path: dist/out/*-win-x64.zip

  build-macos-arm64:
    name: Build macOS (osx-arm64 AOT)
    # macos-14 is the Apple Silicon (M1) GitHub-hosted runner image.
    # NativeAOT cannot cross-compile from Linux/Windows, so the only way
    # to produce an osx-arm64 native binary is to run the publish on an
    # arm64 macOS host. Public repos get macOS minutes for free; private
    # repos are billed at 10x the Linux rate, so think before flipping.
    runs-on: macos-14
    needs: build-ui-tarballs
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download UI tarballs
        uses: actions/download-artifact@v7
        with:
          name: ui-tarballs
          path: dist/out

      - name: Extract UI dists
        run: |
          V="${GITHUB_REF_NAME#v}"; V="${V:-0.1.0}"
          mkdir -p cxb/dist/client catalog/dist/client
          tar -xzf "dist/out/cxb-${V}.tar.gz"     -C cxb/dist/client
          tar -xzf "dist/out/catalog-${V}.tar.gz" -C catalog/dist/client

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION:-0.1.0}" >> "$GITHUB_OUTPUT"

      - name: Publish AOT osx-arm64
        # build.sh's --rid flag drives the publish. UI dists are already
        # extracted above so build.sh's "needs_build" check skips the
        # yarn/npm path (the macos-14 runner does ship Node, but we don't
        # need it here — the dists came from the build-ui-tarballs job).
        run: ./build.sh --aot --rid osx-arm64

      - name: Ad-hoc codesign
        # Ad-hoc (-) signing satisfies macOS's cohesive-signature check
        # that an AOT-stripped Mach-O binary can fail post-publish.
        # Downloaders still need a one-time `xattr -d com.apple.quarantine`
        # to clear Gatekeeper after extracting the zip; full notarization
        # would require an Apple Developer ID cert + secrets wiring.
        run: |
          codesign --force --sign - bin/Release/net10.0/osx-arm64/publish/dmart
          codesign --verify --verbose bin/Release/net10.0/osx-arm64/publish/dmart

      - name: Package zip
        run: |
          mkdir -p dist/out
          ZIP="dist/out/dmart-${{ steps.version.outputs.version }}-osx-arm64.zip"
          # -j strips the bin/Release/net10.0/osx-arm64/publish prefix so
          # the archive extracts flat into wherever the user unzips it —
          # matches the layout of the win-x64 zip.
          (cd bin/Release/net10.0/osx-arm64/publish && zip -9 -r "$OLDPWD/$ZIP" .)
          ls -lh "$ZIP"

      - name: Upload macOS zip to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP=$(ls dist/out/*-osx-arm64.zip 2>/dev/null | head -1)
          if [ -n "$ZIP" ]; then
            gh release upload "$GITHUB_REF_NAME" "$ZIP" --clobber
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: macos-arm64-zip
          path: dist/out/*-osx-arm64.zip

  build-apk-x86_64:
    name: Build Alpine APK (x86_64)
    # Self-hosted runner is already x86_64; the Alpine container the
    # build script spins up will resolve to amd64 automatically, no
    # --platform flag, no QEMU. Same shape as fedora-rpm / el9-rpm.
    runs-on: self-hosted
    needs: build-ui-tarballs
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download UI tarballs
        uses: actions/download-artifact@v7
        with:
          name: ui-tarballs
          path: dist/out

      - name: Extract UI dists
        run: |
          V="${GITHUB_REF_NAME#v}"; V="${V:-0.1.0}"
          mkdir -p cxb/dist/client catalog/dist/client
          tar -xzf "dist/out/cxb-${V}.tar.gz"     -C cxb/dist/client
          tar -xzf "dist/out/catalog-${V}.tar.gz" -C catalog/dist/client

      - name: Build APK (x86_64)
        run: |
          pkill -f 'dmart serve' 2>/dev/null || true
          sleep 1
          rm -rf dist/out/*.apk
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.1.0}"
          VERSION="$VERSION" ./dist/build-apk.sh --arch x86_64

      - name: Upload APK to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(ls dist/out/dmart-*-x86_64.apk 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            gh release upload "$GITHUB_REF_NAME" "$APK" --clobber
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: alpine-apk-x86_64
          path: dist/out/dmart-*-x86_64.apk

  build-apk-aarch64:
    name: Build Alpine APK (aarch64)
    # ubuntu-24.04-arm is a GitHub-hosted Apple-Silicon-equivalent
    # ARM64 Ubuntu runner (free on public repos). Same script as the
    # x86_64 job, different host arch — the Alpine container picks
    # the arm64 manifest variant automatically. No QEMU emulation.
    runs-on: ubuntu-24.04-arm
    needs: build-ui-tarballs
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download UI tarballs
        uses: actions/download-artifact@v7
        with:
          name: ui-tarballs
          path: dist/out

      - name: Extract UI dists
        run: |
          V="${GITHUB_REF_NAME#v}"; V="${V:-0.1.0}"
          mkdir -p cxb/dist/client catalog/dist/client
          tar -xzf "dist/out/cxb-${V}.tar.gz"     -C cxb/dist/client
          tar -xzf "dist/out/catalog-${V}.tar.gz" -C catalog/dist/client

      - name: Build APK (aarch64)
        # ubuntu-24.04-arm ships docker (not podman). CONTAINER_ENGINE
        # toggles the script's `$ENGINE run` call without other changes.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.1.0}"
          CONTAINER_ENGINE=docker VERSION="$VERSION" \
            ./dist/build-apk.sh --arch aarch64

      - name: Upload APK to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(ls dist/out/dmart-*-aarch64.apk 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            gh release upload "$GITHUB_REF_NAME" "$APK" --clobber
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: alpine-apk-aarch64
          path: dist/out/dmart-*-aarch64.apk

  build-container:
    name: Build & Push Container Image
    runs-on: self-hosted
    needs: build-ui-tarballs
    steps:
      # fetch-depth: 0 — need tag history so `git describe --tags` below
      # produces a proper version label for the baked-in InformationalVersion.
      # .dockerignore excludes .git/, so we compute it out here and pass in.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download UI tarballs
        uses: actions/download-artifact@v7
        with:
          name: ui-tarballs
          path: dist/out

      - name: Extract UI dists
        run: |
          V="${GITHUB_REF_NAME#v}"; V="${V:-0.1.0}"
          mkdir -p cxb/dist/client catalog/dist/client
          tar -xzf "dist/out/cxb-${V}.tar.gz"     -C cxb/dist/client
          tar -xzf "dist/out/catalog-${V}.tar.gz" -C catalog/dist/client

      # Reclaim podman storage WITHOUT wiping base images or the long-lived
      # el9 builder container. `podman system prune -af` would also blow
      # away `mcr.microsoft.com/dotnet/sdk:10.0-alpine`, `alpine:edge`, and
      # the almalinux:9 layers that the dmart-el9-builder depends on —
      # forcing re-pulls and full SDK reinstalls on every release.
      #
      # We instead target just the real hogs:
      #   1. Build cache (podman builder prune) — where prior `podman build`
      #      intermediate layers pile up.
      #   2. Dangling images (no `-a`) — images with no tag, typically orphans.
      #   3. Old ghcr.io/edraj/csdmart:<version> tags, keeping :latest and
      #      the version we're about to push.
      - name: Reclaim podman storage
        run: |
          df -h ~ || true
          podman builder prune -af || true
          podman image prune -f || true
          # Delete superseded versioned images of this repo, keep :latest
          # and the incoming version. Safe because the push step tags both.
          KEEP_VER="${GITHUB_REF_NAME#v}"
          KEEP_VER="${KEEP_VER:-0.1.0}"
          podman image ls --format '{{.Repository}}:{{.Tag}}' \
            | grep '^ghcr.io/${{ github.repository }}:' \
            | grep -v ':latest$' \
            | grep -v ":${KEEP_VER}$" \
            | xargs -r -n1 podman rmi -f || true
          df -h ~ || true

      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION:-0.1.0}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build all-in-one container image
        run: |
          # Pass git metadata explicitly — .dockerignore excludes .git/, so
          # the csproj can't derive these inside the build stage. --long
          # forces "<tag>-<n>-g<sha>" so the SHA stays in `dmart -v` even
          # for builds cut exactly on a tag.
          GIT_DESCRIBE=$(git describe --tags --always --long)
          GIT_DATE=$(git show --pretty=format:%cs -q HEAD)
          podman build \
            -t ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }} \
            -t ghcr.io/${{ github.repository }}:latest \
            -f admin_scripts/docker/Dockerfile \
            --build-arg VERSION=${{ steps.version.outputs.version }} \
            --build-arg GIT_DESCRIBE="${GIT_DESCRIBE}" \
            --build-arg GIT_BRANCH="${GITHUB_REF_NAME}" \
            --build-arg GIT_DATE="${GIT_DATE}" \
            .

      - name: Push container image
        run: |
          podman push ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          podman push ghcr.io/${{ github.repository }}:latest

      - name: Print image info
        run: |
          echo "Pushed:"
          echo "  ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}"
          echo "  ghcr.io/${{ github.repository }}:latest"
          echo ""
          echo "Run with:"
          echo "  podman run --name dmart -p 8000:8000 -d -it ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}"
