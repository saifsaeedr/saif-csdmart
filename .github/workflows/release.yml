name: Release

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write
  packages: write

jobs:
  build-srpm:
    name: Build Source RPM
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build CXB frontend
        run: |
          if [ -f cxb/package.json ]; then
            cd cxb && yarn install && yarn build && cd ..
          fi

      - name: Build SRPM
        run: |
          pkill -f 'dmart serve' 2>/dev/null || true
          sleep 1
          rm -rf bin obj dist/out
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.1.0}"
          VERSION="$VERSION" ./dist/build-rpm.sh srpm

      - name: Upload SRPM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SRPM=$(ls dist/out/*.src.rpm 2>/dev/null | head -1)
          if [ -n "$SRPM" ]; then
            gh release upload "$GITHUB_REF_NAME" "$SRPM" --clobber
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: srpm
          path: dist/out/*.src.rpm

  build-fedora-rpm:
    name: Build Fedora RPM
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build CXB frontend
        run: |
          if [ -f cxb/package.json ]; then
            cd cxb && yarn install && yarn build && cd ..
          fi

      - name: Build Fedora RPM
        run: |
          pkill -f 'dmart serve' 2>/dev/null || true
          sleep 1
          rm -rf bin obj dist/out
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.1.0}"
          VERSION="$VERSION" ./dist/build-rpm.sh

      - name: Upload Fedora RPM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RPM=$(ls dist/out/*fc*.x86_64.rpm 2>/dev/null | head -1)
          if [ -n "$RPM" ]; then
            gh release upload "$GITHUB_REF_NAME" "$RPM" --clobber
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: fedora-rpm
          path: dist/out/*.x86_64.rpm

  build-el9-rpm:
    name: Build RHEL 9 RPM
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build CXB frontend
        run: |
          if [ -f cxb/package.json ]; then
            cd cxb && yarn install && yarn build && cd ..
          fi

      # Reclaim podman storage WITHOUT touching the dmart-el9-builder
      # container. build-rpm.sh keeps that container (with dotnet-sdk-10.0,
      # rpm-build, and clang pre-installed) around so subsequent runs just
      # `podman start` it instead of reinstalling the SDK — a 3-5 min save
      # per release. Pruning builder cache + dangling images is enough to
      # reclaim the space without breaking that reuse.
      - name: Reclaim podman storage
        run: |
          df -h ~ || true
          podman builder prune -af || true
          podman image prune -f || true
          df -h ~ || true

      - name: Build EL9 RPM via podman
        run: |
          pkill -f 'dmart serve' 2>/dev/null || true
          sleep 1
          rm -rf dist/out
          # Remove stale builder container from previous runs
          podman rm -f dmart-el9-builder 2>/dev/null || true
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.1.0}"
          VERSION="$VERSION" ./dist/build-rpm.sh el9

      - name: Upload EL9 RPM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RPM=$(ls dist/out/*el9*.x86_64.rpm 2>/dev/null | head -1)
          if [ -n "$RPM" ]; then
            gh release upload "$GITHUB_REF_NAME" "$RPM" --clobber
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: el9-rpm
          path: dist/out/*.x86_64.rpm

  build-windows:
    name: Build Windows (win-x64 AOT)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node (for CXB frontend)
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build CXB frontend
        shell: bash
        run: |
          if [ -f cxb/package.json ]; then
            cd cxb
            npm install --global yarn
            yarn install
            yarn build
            cd ..
          fi

      - name: Set version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION:-0.1.0}" >> "$GITHUB_OUTPUT"

      - name: Publish AOT win-x64
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          $info = "v$v branch=${env:GITHUB_REF_NAME} date=$(Get-Date -Format yyyy-MM-dd)"
          dotnet publish dmart.csproj -r win-x64 -c Release `
            -p:PublishAot=true `
            -p:StripSymbols=true `
            -p:InformationalVersion="$info"

      - name: Prune dev-only artifacts + package zip
        shell: pwsh
        run: |
          $pub = "bin/Release/net10.0/win-x64/publish"
          Get-ChildItem $pub -File | Where-Object {
            $_.Name -match '\.pdb$|\.Development\.json$|\.deps\.json$|staticwebassets'
          } | Remove-Item -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path dist/out | Out-Null
          $zip = "dist/out/dmart-${{ steps.version.outputs.version }}-win-x64.zip"
          Compress-Archive -Path "$pub/*" -DestinationPath $zip -Force
          Get-ChildItem $zip | Format-List FullName,Length

      - name: Upload Windows zip to release
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $zip = Get-ChildItem dist/out/*-win-x64.zip | Select-Object -First 1 -ExpandProperty FullName
          if ($zip) { gh release upload "$env:GITHUB_REF_NAME" "$zip" --clobber }

      - uses: actions/upload-artifact@v7
        with:
          name: windows-zip
          path: dist/out/*-win-x64.zip

  build-container:
    name: Build & Push Container Image
    runs-on: self-hosted
    steps:
      # fetch-depth: 1 — the container build reads the source tree, not
      # git history. The RPM jobs above need fetch-depth: 0 for
      # `git describe`, but this job doesn't.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # Reclaim podman storage WITHOUT wiping base images or the long-lived
      # el9 builder container. `podman system prune -af` would also blow
      # away `mcr.microsoft.com/dotnet/sdk:10.0-alpine`, `alpine:edge`, and
      # the almalinux:9 layers that the dmart-el9-builder depends on —
      # forcing re-pulls and full SDK reinstalls on every release.
      #
      # We instead target just the real hogs:
      #   1. Build cache (podman builder prune) — where prior `podman build`
      #      intermediate layers pile up.
      #   2. Dangling images (no `-a`) — images with no tag, typically orphans.
      #   3. Old ghcr.io/edraj/csdmart:<version> tags, keeping :latest and
      #      the version we're about to push.
      - name: Reclaim podman storage
        run: |
          df -h ~ || true
          podman builder prune -af || true
          podman image prune -f || true
          # Delete superseded versioned images of this repo, keep :latest
          # and the incoming version. Safe because the push step tags both.
          KEEP_VER="${GITHUB_REF_NAME#v}"
          KEEP_VER="${KEEP_VER:-0.1.0}"
          podman image ls --format '{{.Repository}}:{{.Tag}}' \
            | grep '^ghcr.io/${{ github.repository }}:' \
            | grep -v ':latest$' \
            | grep -v ":${KEEP_VER}$" \
            | xargs -r -n1 podman rmi -f || true
          df -h ~ || true

      - name: Build CXB frontend
        run: |
          if [ -f cxb/package.json ]; then
            cd cxb && yarn install && yarn build && cd ..
          fi

      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION:-0.1.0}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build all-in-one container image
        run: |
          podman build \
            -t ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }} \
            -t ghcr.io/${{ github.repository }}:latest \
            -f admin_scripts/docker/Dockerfile \
            --build-arg VERSION=${{ steps.version.outputs.version }} \
            .

      - name: Push container image
        run: |
          podman push ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          podman push ghcr.io/${{ github.repository }}:latest

      - name: Print image info
        run: |
          echo "Pushed:"
          echo "  ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}"
          echo "  ghcr.io/${{ github.repository }}:latest"
          echo ""
          echo "Run with:"
          echo "  podman run --name dmart -p 8000:8000 -d -it ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}"
